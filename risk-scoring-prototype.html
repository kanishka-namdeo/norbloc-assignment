<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>norbloc — Adaptive AI Risk Scoring</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-dark: #0f1117;
      --bg-card: #1a1d27;
      --bg-hover: #252836;
      --border: #2d3148;
      --text-primary: #f0f0f5;
      --text-secondary: #9ca3b8;
      --text-muted: #6b7280;
      --accent-blue: #3b82f6;
      --accent-green: #10b981;
      --accent-amber: #f59e0b;
      --accent-red: #ef4444;
      --accent-purple: #8b5cf6;
      --accent-orange: #f97316;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      --radius: 12px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      height: 64px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }
    .header-logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent-blue);
      letter-spacing: -0.5px;
    }
    .header-logo span { color: var(--text-primary); }
    .header-divider {
      width: 1px;
      height: 24px;
      background: var(--border);
      margin: 0 16px;
    }
    .header-title {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .header-badge {
      margin-left: auto;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Nav tabs inside header area - using a secondary nav bar */
    .nav-bar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: fixed;
      top: 64px;
      left: 0;
      right: 0;
      z-index: 99;
      display: flex;
      align-items: center;
      height: 44px;
    }
    .nav-tabs {
      display: flex;
      gap: 4px;
    }
    .nav-tab {
      padding: 8px 16px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      border-radius: 6px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav-tab:hover { color: var(--text-secondary); background: var(--bg-hover); }
    .nav-tab.active {
      color: var(--accent-blue);
      background: rgba(59, 130, 246, 0.1);
    }
    .nav-tab .alert-badge {
      background: var(--accent-red);
      color: white;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      font-weight: 600;
    }
    .nav-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ai-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--accent-green);
      font-weight: 500;
    }
    .ai-dot {
      width: 8px;
      height: 8px;
      background: var(--accent-green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Main content */
    .main {
      padding: 128px 24px 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Screens */
    .screen {
      display: none;
    }
    .screen.active {
      display: block;
      animation: fadeIn 0.3s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Row flash animation for score changes */
    @keyframes rowFlash {
      0% { background: rgba(59, 130, 246, 0.15); }
      100% { background: transparent; }
    }
    .row-flash {
      animation: rowFlash 1.5s ease-out;
    }

    /* Stats cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
    }
    .stat-change {
      font-size: 12px;
      margin-top: 4px;
      font-weight: 500;
    }
    .stat-change.positive { color: var(--accent-green); }
    .stat-change.negative { color: var(--accent-red); }

    /* Cards */
    .card {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 20px;
      margin-bottom: 20px;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
    }
    .card-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Table */
    .table-container { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th {
      text-align: left;
      padding: 12px 16px;
      font-weight: 600;
      color: var(--text-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    th:hover { color: var(--text-secondary); }
    th .sort-icon { margin-left: 4px; opacity: 0.3; }
    th.sorted .sort-icon { opacity: 1; color: var(--accent-blue); }
    td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr { cursor: pointer; transition: background 0.2s ease; }
    tbody tr:hover { background: var(--bg-hover); }

    .user-cell {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      flex-shrink: 0;
    }
    .user-name { font-weight: 500; }
    .user-email { font-size: 12px; color: var(--text-muted); }

    /* Badges - matching index.html style */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-low { background: rgba(16, 185, 129, 0.2); color: var(--accent-green); }
    .badge-medium { background: rgba(245, 158, 11, 0.2); color: var(--accent-amber); }
    .badge-high { background: rgba(249, 115, 22, 0.2); color: var(--accent-orange); }
    .badge-critical { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); }
    .badge-blue { background: rgba(59, 130, 246, 0.2); color: var(--accent-blue); }

    /* Trend indicators */
    .trend {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-weight: 500;
      font-size: 13px;
    }
    .trend-up { color: var(--accent-red); }
    .trend-down { color: var(--accent-green); }
    .trend-stable { color: var(--text-muted); }

    /* Score display */
    .score-bar {
      width: 100px;
      height: 6px;
      background: var(--bg-hover);
      border-radius: 3px;
      overflow: hidden;
      display: inline-block;
      vertical-align: middle;
      margin-left: 8px;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease, background 0.5s ease;
    }

    /* KYC status */
    .kyc-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }
    .kyc-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .kyc-valid .kyc-dot { background: var(--accent-green); }
    .kyc-expiring .kyc-dot { background: var(--accent-amber); }
    .kyc-expired .kyc-dot { background: var(--accent-red); }

    /* Chart container */
    .chart-wrapper {
      position: relative;
      height: 250px;
    }
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    /* User detail screen */
    .detail-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }
    .detail-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 24px;
      flex-shrink: 0;
    }
    .detail-name { font-size: 24px; font-weight: 700; }
    .detail-meta { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
    .detail-score {
      margin-left: auto;
      text-align: right;
    }
    .detail-score-value {
      font-size: 48px;
      font-weight: 800;
      line-height: 1;
    }
    .detail-score-label {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* AI Recommendation - matching red-flag style from index.html */
    .ai-recommendation {
      border-radius: 8px;
      padding: 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 20px;
    }
    .ai-recommendation.approve {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }
    .ai-recommendation.review {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
    }
    .ai-recommendation.reject {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    .ai-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
    .ai-rec-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .ai-rec-text { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

    /* Risk factor bars */
    .risk-factor { margin-bottom: 16px; }
    .risk-factor-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .risk-factor-name { font-weight: 500; }
    .risk-factor-value { color: var(--text-muted); }
    .risk-factor-bar {
      height: 8px;
      background: var(--bg-hover);
      border-radius: 4px;
      overflow: hidden;
    }
    .risk-factor-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    /* Timeline - matching index.html citation style */
    .timeline { position: relative; padding-left: 24px; }
    .timeline::before {
      content: '';
      position: absolute;
      left: 8px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }
    .timeline-item {
      position: relative;
      margin-bottom: 20px;
    }
    .timeline-dot {
      position: absolute;
      left: -20px;
      top: 4px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid var(--accent-blue);
      background: var(--bg-card);
    }
    .timeline-date { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .timeline-content { font-size: 14px; }
    .timeline-score { font-weight: 600; }

    /* Compliance card */
    .compliance-card {
      background: var(--bg-hover);
      border-radius: 10px;
      padding: 16px;
    }
    .compliance-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .compliance-row:last-child { border-bottom: none; }
    .compliance-label { font-size: 14px; color: var(--text-muted); }
    .compliance-value { font-weight: 600; font-size: 14px; }
    .countdown {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
    }
    .countdown-valid { background: rgba(16, 185, 129, 0.2); color: var(--accent-green); }
    .countdown-expiring { background: rgba(245, 158, 11, 0.2); color: var(--accent-amber); }
    .countdown-expired { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); }

    /* Alert feed */
    .alert-filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 14px;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .filter-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
    .filter-btn.active {
      background: var(--accent-blue);
      color: white;
      border-color: var(--accent-blue);
    }

    .alert-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      background: var(--bg-card);
      transition: all 0.2s ease;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .alert-card:hover { box-shadow: var(--shadow); }

    .alert-severity {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: 6px;
      flex-shrink: 0;
    }
    .alert-severity.critical { background: var(--accent-red); box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2); }
    .alert-severity.high { background: var(--accent-orange); box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.2); }

    .alert-content { flex: 1; }
    .alert-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .alert-reason { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
    .alert-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .alert-action-btn {
      padding: 6px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      align-self: flex-start;
      margin-top: 4px;
    }
    .alert-action-btn.acknowledge {
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      color: white;
    }
    .alert-action-btn.acknowledge:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
    .alert-action-btn.view {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .alert-action-btn.view:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
    .alert-card.acknowledged { opacity: 0.5; }
    .alert-card.acknowledged .alert-action-btn { display: none; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px;
      color: var(--text-muted);
    }
    .empty-state-icon { font-size: 48px; margin-bottom: 12px; }

    /* Buttons */
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      color: white;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4); }
    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

    /* Back button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: var(--text-muted);
      cursor: pointer;
      margin-bottom: 16px;
      padding: 6px 0;
      border: none;
      background: none;
      transition: color 0.2s ease;
    }
    .back-btn:hover { color: var(--accent-blue); }

    /* Responsive */
    @media (max-width: 1024px) {
      .charts-grid { grid-template-columns: 1fr; }
      .detail-header { flex-wrap: wrap; }
      .detail-score { margin-left: 0; width: 100%; text-align: left; margin-top: 16px; }
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .header { padding: 0 16px; }
      .nav-bar { padding: 0 16px; }
      .main { padding: 120px 16px 16px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

    .tier-filter {
      padding: 3px 10px;
      border: none;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--bg-hover);
      color: var(--text-secondary);
    }
    .tier-filter:hover { opacity: 0.8; }
    .tier-filter.active { background: var(--accent-blue); color: white; }

    .mt-2 { margin-top: 8px; }
    .mt-4 { margin-top: 16px; }
    .mb-4 { margin-bottom: 16px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">norbloc <span>RiskAI</span></div>
    <div class="header-divider"></div>
    <div class="header-title">Adaptive AI Risk Scoring</div>
    <div class="header-badge">Prototype</div>
  </div>

  <!-- Nav bar -->
  <div class="nav-bar">
    <nav class="nav-tabs">
      <button class="nav-tab active" data-tab="dashboard">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </button>
      <button class="nav-tab" data-tab="alerts">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        Alerts <span class="alert-badge" id="alert-count-badge">0</span>
      </button>
    </nav>
    <div class="nav-right">
      <div class="ai-status">
        <span class="ai-dot"></span>
        AI Scoring Active
      </div>
    </div>
  </div>

  <main class="main">
    <!-- DASHBOARD SCREEN -->
    <section id="screen-dashboard" class="screen active">
      <div class="stats-grid" id="stats-grid"></div>

      <div class="charts-grid">
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">Risk Score Distribution</div>
              <div class="card-subtitle">Users by risk tier</div>
            </div>
          </div>
          <div class="chart-wrapper">
            <canvas id="distribution-chart"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">KYC Compliance Status</div>
              <div class="card-subtitle">Document expiry overview</div>
            </div>
          </div>
          <div class="chart-wrapper">
            <canvas id="kyc-chart"></canvas>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">User Risk Overview</div>
            <div class="card-subtitle">Click any user to view details</div>
          </div>
          <div style="display: flex; gap: 8px; align-items: center;">
            <input type="text" id="table-search" placeholder="Search users..." style="padding: 7px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-hover); color: var(--text-primary); font-size: 13px; width: 200px; outline: none;" oninput="renderTable()">
            <button class="btn btn-secondary" onclick="refreshScores()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
              Refresh Scores
            </button>
          </div>
        </div>
        <div style="padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center;">
          <span style="font-size: 12px; color: var(--text-muted);">Filter by tier:</span>
          <button class="tier-filter active" data-tier="all" onclick="setTierFilter('all')">All</button>
          <button class="tier-filter" data-tier="low" onclick="setTierFilter('low')" style="background: rgba(16,185,129,0.2); color: #10b981;">Low</button>
          <button class="tier-filter" data-tier="medium" onclick="setTierFilter('medium')" style="background: rgba(245,158,11,0.2); color: #f59e0b;">Medium</button>
          <button class="tier-filter" data-tier="high" onclick="setTierFilter('high')" style="background: rgba(249,115,22,0.2); color: #f97316;">High</button>
          <button class="tier-filter" data-tier="critical" onclick="setTierFilter('critical')" style="background: rgba(239,68,68,0.2); color: #ef4444;">Critical</button>
        </div>
        <div class="table-container">
          <table id="users-table">
            <thead>
              <tr id="users-table-head"></tr>
            </thead>
            <tbody id="users-table-body"></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- USER DETAIL SCREEN -->
    <section id="screen-user-detail" class="screen">
      <button class="back-btn" onclick="showScreen('dashboard')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        Back to Dashboard
      </button>
      <div id="user-detail-content"></div>
    </section>

    <!-- ALERT FEED SCREEN -->
    <section id="screen-alerts" class="screen">
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">Alert Feed</div>
            <div class="card-subtitle">Flagged cases requiring review</div>
          </div>
        </div>
        <div class="alert-filters" id="alert-filters"></div>
        <div id="alerts-container"></div>
      </div>
    </section>
  </main>

<script>
// ==========================================
// MOCK DATA
// ==========================================
const now = new Date();
const firstNames = ['Emma', 'Liam', 'Olivia', 'Noah', 'Ava', 'Ethan', 'Sophia', 'Mason', 'Isabella', 'William', 'Mia', 'James', 'Charlotte', 'Benjamin', 'Amelia', 'Lucas', 'Harper', 'Henry', 'Evelyn', 'Alexander', 'Abigail', 'Daniel', 'Ella', 'Michael'];
const lastNames = ['Anderson', 'Smith', 'Johnson', 'Williams', 'Brown', 'Jones', 'Garcia', 'Miller', 'Davis', 'Rodriguez', 'Martinez', 'Wilson', 'Taylor', 'Thomas', 'Moore', 'Jackson', 'Martin', 'Lee', 'Thompson', 'White', 'Harris', 'Clark', 'Lewis', 'Walker'];

function randomDate(daysBack, daysForward) {
  const d = new Date();
  d.setDate(d.getDate() + (Math.random() * (daysForward + daysBack) - daysBack));
  return d;
}

function formatDate(d) {
  return d.toISOString().split('T')[0];
}

function generateTrendData(baseScore, days) {
  const data = [];
  let score = baseScore + (Math.random() * 20 - 10);
  for (let i = days; i >= 0; i--) {
    score += (Math.random() * 6 - 3);
    score = Math.max(5, Math.min(95, score));
    data.push({ date: formatDate(new Date(Date.now() - i * 86400000)), score: Math.round(score) });
  }
  return data;
}

function generateScoreHistory(trendData) {
  const changes = [];
  for (let i = 0; i < trendData.length; i += Math.floor(Math.random() * 7 + 3)) {
    const prev = i > 0 ? trendData[i - 1].score : trendData[0].score;
    const diff = trendData[i].score - prev;
    if (Math.abs(diff) > 5) {
      changes.push({
        date: trendData[i].date,
        oldScore: prev,
        newScore: trendData[i].score,
        reason: diff > 0 ? 'Risk factors increased' : 'Compliance improved'
      });
    }
  }
  return changes.slice(-5);
}

function getKYCStatus(expiryDate) {
  const days = Math.ceil((expiryDate - now) / 86400000);
  if (days < 0) return { status: 'expired', label: 'Expired', days, class: 'kyc-expired' };
  if (days < 30) return { status: 'expiring', label: 'Expiring Soon', days, class: 'kyc-expiring' };
  return { status: 'valid', label: 'Valid', days, class: 'kyc-valid' };
}

function getRiskTier(score) {
  if (score < 25) return 'Low';
  if (score < 50) return 'Medium';
  if (score < 75) return 'High';
  return 'Critical';
}

function getRiskClass(score) { return getRiskTier(score).toLowerCase(); }

function getTrendDirection(trendData) {
  if (trendData.length < 7) return 'stable';
  const recent = trendData.slice(-7);
  const avg1 = recent.slice(0, 3).reduce((a, b) => a + b.score, 0) / 3;
  const avg2 = recent.slice(-3).reduce((a, b) => a + b.score, 0) / 3;
  const diff = avg2 - avg1;
  if (diff > 5) return 'up';
  if (diff < -5) return 'down';
  return 'stable';
}

function getAIRecommendation(user) {
  if (user.riskScore < 25) return { action: 'Approve', icon: 'check-circle', text: `Low risk profile. KYC documentation is ${user.kyc.status.toLowerCase()} with ${user.kyc.days > 0 ? user.kyc.days + ' days remaining' : 'no immediate concerns'}. No additional review required.` };
  if (user.riskScore < 50) return { action: 'Review', icon: 'alert-circle', text: `Moderate risk detected. ${user.kyc.status === 'expiring' ? 'KYC documents expiring soon — renewal recommended.' : 'Standard monitoring in place.'} Consider enhanced due diligence.` };
  if (user.riskScore < 75) return { action: 'Review', icon: 'alert-triangle', text: `Elevated risk score. ${user.kyc.status === 'expired' ? 'KYC documentation has expired — immediate renewal required.' : 'Multiple risk factors present.'} Enhanced due diligence strongly recommended.` };
  return { action: 'Reject', icon: 'x-circle', text: `Critical risk level. ${user.kyc.status === 'expired' ? 'Expired KYC documentation combined with high-risk indicators.' : 'Significant risk factors identified.'} Account restrictions should be applied immediately.` };
}

  const users = firstNames.map((firstName, i) => {
  const lastName = lastNames[i];
  const kycExpiry = randomDate(-60, 365);
  const kyc = getKYCStatus(kycExpiry);
  let riskScore;
  if (kyc.status === 'expired') riskScore = 60 + Math.random() * 35;
  else if (kyc.status === 'expiring') riskScore = 35 + Math.random() * 30;
  else riskScore = 10 + Math.random() * 25;
  riskScore = Math.round(riskScore);
  const trendData = generateTrendData(riskScore, 30);
  const lastVerified = randomDate(-30, -1);
  return {
    id: `USR-${String(i + 1).padStart(4, '0')}`,
    name: `${firstName} ${lastName}`,
    email: `${firstName.toLowerCase()}.${lastName.toLowerCase()}@example.com`,
    riskScore,
    riskTier: getRiskTier(riskScore),
    kycExpiry,
    kyc,
    trendData,
    scoreHistory: generateScoreHistory(trendData),
    lastUpdated: randomDate(-1, 0),
    trendDirection: getTrendDirection(trendData),
    lastVerified
  };
});

const alerts = users.filter(u => u.riskScore >= 50 || u.kyc.status === 'expired').map((user, i) => ({
  id: `ALT-${String(i + 1).padStart(4, '0')}`,
  userId: user.id,
  userName: user.name,
  userScore: user.riskScore,
  severity: user.riskScore >= 75 || user.kyc.status === 'expired' ? 'critical' : 'high',
  reason: user.kyc.status === 'expired' ? 'KYC documentation expired' :
          user.kyc.status === 'expiring' ? 'KYC documents expiring within 30 days' :
          'Risk score exceeded threshold',
  aiAction: getAIRecommendation(user).action,
  timestamp: randomDate(-7, 0),
  acknowledged: false
}));

// ==========================================
// RENDER FUNCTIONS
// ==========================================
let distributionChart, kycChart, userTrendChart;
let currentSort = { column: 'riskScore', direction: 'desc' };
let alertFilter = 'all';
let tierFilter = 'all';
let lastUpdatedUserIds = [];
let previousScores = {};

// Track previous scores for flash detection
users.forEach(u => { previousScores[u.id] = u.riskScore; });

function renderStats() {
  const total = users.length;
  const highCritical = users.filter(u => u.riskScore >= 50).length;
  const avgScore = Math.round(users.reduce((a, u) => a + u.riskScore, 0) / total);
  const activeAlerts = alerts.filter(a => !a.acknowledged).length;

  document.getElementById('alert-count-badge').textContent = activeAlerts;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Users Monitored</div>
      <div class="stat-value" style="color: var(--accent-blue);">${total}</div>
      <div class="stat-change positive">Active tracking</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">High / Critical Risk</div>
      <div class="stat-value" style="color: ${highCritical > 5 ? 'var(--accent-red)' : 'var(--accent-orange)'}">${highCritical}</div>
      <div class="stat-change negative">${Math.round(highCritical / total * 100)}% of total</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Average Risk Score</div>
      <div class="stat-value">${avgScore}</div>
      <div class="stat-change ${avgScore < 35 ? 'positive' : 'negative'}">out of 100</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Active Alerts</div>
      <div class="stat-value" style="color: ${activeAlerts > 3 ? 'var(--accent-red)' : 'var(--accent-orange)'}">${activeAlerts}</div>
      <div class="stat-change negative">Requires attention</div>
    </div>
  `;
}

function renderCharts() {
  const tiers = { Low: 0, Medium: 0, High: 0, Critical: 0 };
  users.forEach(u => tiers[u.riskTier]++);

  const kycCounts = { Valid: 0, 'Expiring Soon': 0, Expired: 0 };
  users.forEach(u => kycCounts[u.kyc.status === 'valid' ? 'Valid' : u.kyc.status === 'expiring' ? 'Expiring Soon' : 'Expired']++);

  const chartTextColor = '#9ca3b8';
  const chartGridColor = '#2d3148';

  const chartDefaults = {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 600, easing: 'easeOutQuart' },
    plugins: { legend: { display: false } },
    scales: {
      y: { beginAtZero: true, ticks: { stepSize: 1, color: chartTextColor }, grid: { color: chartGridColor } },
      x: { ticks: { color: chartTextColor }, grid: { display: false } }
    }
  };

  if (!distributionChart) {
    distributionChart = new Chart(document.getElementById('distribution-chart'), {
      type: 'bar',
      data: {
        labels: ['Low', 'Medium', 'High', 'Critical'],
        datasets: [{
          data: [tiers.Low, tiers.Medium, tiers.High, tiers.Critical],
          backgroundColor: ['#10b981', '#f59e0b', '#f97316', '#ef4444'],
          borderRadius: 6,
          barThickness: 40
        }]
      },
      options: chartDefaults
    });
  } else {
    distributionChart.data.datasets[0].data = [tiers.Low, tiers.Medium, tiers.High, tiers.Critical];
    distributionChart.update();
  }

  if (!kycChart) {
    kycChart = new Chart(document.getElementById('kyc-chart'), {
      type: 'doughnut',
      data: {
        labels: ['Valid', 'Expiring Soon', 'Expired'],
        datasets: [{
          data: [kycCounts.Valid, kycCounts['Expiring Soon'], kycCounts.Expired],
          backgroundColor: ['#10b981', '#f59e0b', '#ef4444'],
          borderWidth: 0
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 600, easing: 'easeOutQuart' },
        cutout: '65%',
        plugins: {
          legend: { position: 'bottom', labels: { padding: 16, usePointStyle: true, pointStyle: 'circle', color: chartTextColor } }
        }
      }
    });
  } else {
    kycChart.data.datasets[0].data = [kycCounts.Valid, kycCounts['Expiring Soon'], kycCounts.Expired];
    kycChart.update();
  }
}

function renderTable() {
  const searchTerm = (document.getElementById('table-search')?.value || '').toLowerCase();

  let filtered = users.filter(u => {
    const matchTier = tierFilter === 'all' || u.riskTier.toLowerCase() === tierFilter;
    const matchSearch = !searchTerm ||
      u.name.toLowerCase().includes(searchTerm) ||
      u.email.toLowerCase().includes(searchTerm) ||
      u.id.toLowerCase().includes(searchTerm);
    return matchTier && matchSearch;
  });

  const sorted = [...filtered].sort((a, b) => {
    const col = currentSort.column;
    const dir = currentSort.direction === 'asc' ? 1 : -1;
    if (col === 'name') return dir * a.name.localeCompare(b.name);
    if (col === 'kycExpiry') return dir * (a.kycExpiry - b.kycExpiry);
    return dir * (a[col] - b[col]);
  });

  const thHTML = `
    <th data-col="id">User ID <span class="sort-icon">${currentSort.column === 'id' ? (currentSort.direction === 'asc' ? '↑' : '↓') : '↕'}</span></th>
    <th data-col="name">User <span class="sort-icon">${currentSort.column === 'name' ? (currentSort.direction === 'asc' ? '↑' : '↓') : '↕'}</span></th>
    <th data-col="riskScore" class="${currentSort.column === 'riskScore' ? 'sorted' : ''}">Risk Score <span class="sort-icon">${currentSort.column === 'riskScore' ? (currentSort.direction === 'asc' ? '↑' : '↓') : '↕'}</span></th>
    <th data-col="riskTier">Risk Tier</th>
    <th data-col="kycExpiry" class="${currentSort.column === 'kycExpiry' ? 'sorted' : ''}">KYC Status <span class="sort-icon">${currentSort.column === 'kycExpiry' ? (currentSort.direction === 'asc' ? '↑' : '↓') : '↕'}</span></th>
    <th data-col="trendDirection">AI Trend</th>
    <th data-col="lastUpdated">Last Updated</th>
  `;
  document.getElementById('users-table-head').innerHTML = thHTML;

  document.querySelectorAll('#users-table-head th').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (currentSort.column === col) currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
      else { currentSort.column = col; currentSort.direction = 'desc'; }
      renderTable();
    });
  });

  let tbody = '';
  sorted.forEach(user => {
    const initials = user.name.split(' ').map(n => n[0]).join('');
    const scoreColor = getScoreColor(user.riskScore);
    const trendIcon = user.trendDirection === 'up' ? '↑' : user.trendDirection === 'down' ? '↓' : '→';
    const trendClass = user.trendDirection === 'up' ? 'trend-up' : user.trendDirection === 'down' ? 'trend-down' : 'trend-stable';
    const hasChanged = previousScores[user.id] !== undefined && previousScores[user.id] !== user.riskScore;
    const flashClass = hasChanged ? 'row-flash' : '';

    tbody += `
      <tr onclick="showUserDetail('${user.id}')" class="${flashClass}" id="row-${user.id}">
        <td style="font-family: monospace; font-size: 13px; color: var(--text-muted)">${user.id}</td>
        <td>
          <div class="user-cell">
            <div class="avatar">${initials}</div>
            <div>
              <div class="user-name">${user.name}</div>
              <div class="user-email">${user.email}</div>
            </div>
          </div>
        </td>
        <td>
          <span style="font-weight: 700; color: ${scoreColor}">${user.riskScore}</span>
          ${hasChanged ? `<span style="font-size: 11px; color: var(--accent-blue); margin-left: 4px;">(${previousScores[user.id] > user.riskScore ? '↓' : '↑'}${Math.abs(user.riskScore - previousScores[user.id])})</span>` : ''}
          <div class="score-bar"><div class="score-bar-fill" style="width: ${user.riskScore}%; background: ${scoreColor}"></div></div>
        </td>
        <td><span class="badge badge-${getRiskClass(user.riskScore)}">${user.riskTier}</span></td>
        <td>
          <div class="kyc-status ${user.kyc.class}">
            <span class="kyc-dot"></span>
            ${user.kyc.label}${user.kyc.days > 0 ? ` (${user.kyc.days}d)` : ''}
          </div>
        </td>
        <td><span class="trend ${trendClass}">${trendIcon} ${user.trendDirection === 'up' ? 'Increasing' : user.trendDirection === 'down' ? 'Decreasing' : 'Stable'}</span></td>
        <td style="font-size: 13px; color: var(--text-muted)">${formatDate(user.lastUpdated)}</td>
      </tr>
    `;

    previousScores[user.id] = user.riskScore;
  });
  document.getElementById('users-table-body').innerHTML = tbody;

  const resultInfo = document.getElementById('table-result-info');
  if (resultInfo) {
    resultInfo.textContent = `Showing ${sorted.length} of ${users.length} users`;
  }
}

function setTierFilter(tier) {
  tierFilter = tier;
  document.querySelectorAll('.tier-filter').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tier === tier);
  });
  renderTable();
}

function getScoreColor(score) {
  if (score < 25) return '#10b981';
  if (score < 50) return '#f59e0b';
  if (score < 75) return '#f97316';
  return '#ef4444';
}

function renderAlerts() {
  const filtered = alerts.filter(a => {
    if (alertFilter === 'all') return true;
    if (alertFilter === 'active') return !a.acknowledged;
    if (alertFilter === 'critical') return a.severity === 'critical';
    if (alertFilter === 'high') return a.severity === 'high';
    if (alertFilter === 'acknowledged') return a.acknowledged;
    return true;
  });

  const filtersHTML = ['all', 'active', 'critical', 'high', 'acknowledged'].map(f =>
    `<button class="filter-btn ${alertFilter === f ? 'active' : ''}" onclick="setAlertFilter('${f}')">${f === 'all' ? 'All' : f === 'active' ? 'Active' : f === 'critical' ? 'Critical' : f === 'high' ? 'High' : 'Reviewed'}</button>`
  ).join('');
  document.getElementById('alert-filters').innerHTML = filtersHTML;

  if (filtered.length === 0) {
    document.getElementById('alerts-container').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">&#x1F6E1;</div>
        <div>All clear — no alerts match your filter</div>
      </div>
    `;
    return;
  }

  let html = '';
  filtered.forEach(alert => {
    html += `
      <div class="alert-card ${alert.acknowledged ? 'acknowledged' : ''}">
        <div class="alert-severity ${alert.severity}"></div>
        <div class="alert-content">
          <div class="alert-title">${alert.userName} (${alert.userId})</div>
          <div class="alert-reason">${alert.reason} — AI recommends: <strong>${alert.aiAction}</strong></div>
          <div class="alert-meta">
            <span>Score: <strong>${alert.userScore}</strong></span>
            <span>Severity: <strong>${alert.severity.toUpperCase()}</strong></span>
            <span>${formatDate(alert.timestamp)}</span>
          </div>
        </div>
        ${!alert.acknowledged ? `
          <button class="alert-action-btn acknowledge" onclick="acknowledgeAlert('${alert.id}')">Acknowledge</button>
          <button class="alert-action-btn view" onclick="showUserDetail('${alert.userId}'); showScreen('user-detail')">View</button>
        ` : '<span style="font-size: 12px; color: var(--text-muted)">Reviewed</span>'}
      </div>
    `;
  });
  document.getElementById('alerts-container').innerHTML = html;
}

function setAlertFilter(filter) {
  alertFilter = filter;
  renderAlerts();
}

function acknowledgeAlert(alertId) {
  const alert = alerts.find(a => a.id === alertId);
  if (alert) {
    alert.acknowledged = true;
    renderAlerts();
    renderStats();
  }
}

// ==========================================
// USER DETAIL
// ==========================================
function showUserDetail(userId) {
  const user = users.find(u => u.id === userId);
  if (!user) return;

  const initials = user.name.split(' ').map(n => n[0]).join('');
  const scoreColor = getScoreColor(user.riskScore);
  const recommendation = getAIRecommendation(user);
  const recClass = recommendation.action.toLowerCase() === 'approve' ? 'approve' : recommendation.action.toLowerCase() === 'reject' ? 'reject' : 'review';
  const recIcon = recommendation.icon === 'check-circle' ? '&#x2713;' : recommendation.icon === 'x-circle' ? '&#x2717;' : recommendation.icon === 'alert-triangle' ? '&#x26a0;' : '&#x2139;';
  const recTitleColor = recommendation.action.toLowerCase() === 'approve' ? 'var(--accent-green)' : recommendation.action.toLowerCase() === 'reject' ? 'var(--accent-red)' : 'var(--accent-amber)';

  // Risk factor breakdown (simulated)
  const riskFactors = [
    { name: 'Document Validity', value: user.kyc.status === 'expired' ? 85 : user.kyc.status === 'expiring' ? 55 : 15, weight: 40 },
    { name: 'Data Completeness', value: 20 + Math.random() * 30, weight: 20 },
    { name: 'Behavioral Signals', value: 10 + Math.random() * 40, weight: 15 },
    { name: 'Geographic Consistency', value: 5 + Math.random() * 25, weight: 15 },
    { name: 'Historical Patterns', value: 15 + Math.random() * 35, weight: 10 }
  ];

  // Calculate predicted trend
  const recentScores = user.trendData.slice(-7).map(d => d.score);
  const slope = (recentScores[recentScores.length - 1] - recentScores[0]) / recentScores.length;
  const predicted = [];
  let lastScore = user.riskScore;
  for (let i = 1; i <= 7; i++) {
    lastScore += slope * 0.8 + (Math.random() * 4 - 2);
    predicted.push({ date: formatDate(new Date(Date.now() + i * 86400000)), score: Math.max(0, Math.min(100, Math.round(lastScore))), predicted: true });
  }

  const content = `
    <div class="detail-header">
      <div class="detail-avatar">${initials}</div>
      <div>
        <div class="detail-name">${user.name}</div>
        <div class="detail-meta">${user.email} &bull; ${user.id} &bull; KYC ${user.kyc.status}</div>
      </div>
      <div class="detail-score">
        <div class="detail-score-value" style="color: ${scoreColor}">${user.riskScore}</div>
        <div class="detail-score-label">Risk Score / 100</div>
        <span class="badge badge-${getRiskClass(user.riskScore)} mt-2">${user.riskTier} Risk</span>
      </div>
    </div>

    <div class="ai-recommendation ${recClass}">
      <span class="ai-icon" style="color: ${recTitleColor}">${recIcon}</span>
      <div>
        <div class="ai-rec-title" style="color: ${recTitleColor}">AI Recommendation: ${recommendation.action}</div>
        <div class="ai-rec-text">${recommendation.text}</div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">Risk Trend (30 Days)</div>
            <div class="card-subtitle">Historical + AI predicted trend</div>
          </div>
        </div>
        <div class="chart-wrapper">
          <canvas id="user-trend-chart"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">Risk Factor Breakdown</div>
            <div class="card-subtitle">Contribution to overall score</div>
          </div>
        </div>
        <div id="risk-factors-container">
          ${riskFactors.map(f => `
            <div class="risk-factor">
              <div class="risk-factor-header">
                <span class="risk-factor-name">${f.name}</span>
                <span class="risk-factor-value">${Math.round(f.value)}%</span>
              </div>
              <div class="risk-factor-bar">
                <div class="risk-factor-fill" style="width: ${f.value}%; background: ${getScoreColor(f.value)}"></div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">Compliance / KYC Status</div>
          </div>
        </div>
        <div class="compliance-card">
          <div class="compliance-row">
            <span class="compliance-label">Document Status</span>
            <span class="compliance-value" style="color: ${user.kyc.status === 'valid' ? 'var(--accent-green)' : user.kyc.status === 'expiring' ? 'var(--accent-amber)' : 'var(--accent-red)'}">${user.kyc.label}</span>
          </div>
          <div class="compliance-row">
            <span class="compliance-label">Expiry Date</span>
            <span class="compliance-value">${formatDate(user.kycExpiry)}</span>
          </div>
          <div class="compliance-row">
            <span class="compliance-label">Days Remaining</span>
            <span class="countdown ${user.kyc.status === 'valid' ? 'countdown-valid' : user.kyc.status === 'expiring' ? 'countdown-expiring' : 'countdown-expired'}">${user.kyc.days > 0 ? user.kyc.days + ' days' : 'Expired'}</span>
          </div>
          <div class="compliance-row">
            <span class="compliance-label">Last Verified</span>
            <span class="compliance-value">${formatDate(user.lastVerified)}</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">Scoring History</div>
          </div>
        </div>
        <div class="timeline">
          ${user.scoreHistory.length === 0 ? '<p style="color: var(--text-muted); font-size: 14px;">No significant score changes in recent history.</p>' :
            user.scoreHistory.map(h => `
              <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="timeline-date">${h.date}</div>
                <div class="timeline-content">
                  Score changed: <span class="timeline-score" style="color: ${h.newScore > h.oldScore ? 'var(--accent-red)' : 'var(--accent-green)'}">${h.oldScore} → ${h.newScore}</span>
                </div>
                <div style="font-size: 12px; color: var(--text-muted); margin-top: 2px;">${h.reason}</div>
              </div>
            `).join('')}
        </div>
      </div>
    </div>
  `;

  document.getElementById('user-detail-content').innerHTML = content;

  // Render trend chart
  setTimeout(() => {
    const ctx = document.getElementById('user-trend-chart');
    if (!ctx) return;

    const chartTextColor = '#9ca3b8';
    const chartGridColor = '#2d3148';
    const actualData = user.trendData.map(d => d.score);
    const labels = user.trendData.map(d => d.date);
    const predData = new Array(user.trendData.length).fill(null).concat(predicted.map(d => d.score));
    const allLabels = [...labels, ...predLabels.map(d => d.date)];
    const allActual = [...actualData, ...new Array(predicted.length).fill(null)];

    if (!userTrendChart) {
      userTrendChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: allLabels,
          datasets: [
            {
              label: 'Historical Score',
              data: allActual,
              borderColor: '#3b82f6',
              backgroundColor: 'rgba(59, 130, 246, 0.1)',
              fill: true,
              tension: 0.3,
              pointRadius: 0,
              pointHoverRadius: 4
            },
            {
              label: 'AI Predicted',
              data: predData,
              borderColor: '#8b5cf6',
              borderDash: [5, 5],
              tension: 0.3,
              pointRadius: 0,
              pointHoverRadius: 4,
              fill: false
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 600 },
          plugins: {
            legend: { position: 'bottom', labels: { usePointStyle: true, pointStyle: 'line', padding: 16, color: chartTextColor } }
          },
          scales: {
            y: { min: 0, max: 100, ticks: { stepSize: 20, color: chartTextColor }, grid: { color: chartGridColor } },
            x: { ticks: { maxTicksLimit: 8, maxRotation: 0, color: chartTextColor }, grid: { color: chartGridColor } }
          }
        }
      });
    } else {
      userTrendChart.destroy();
      userTrendChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: allLabels,
          datasets: [
            {
              label: 'Historical Score',
              data: allActual,
              borderColor: '#3b82f6',
              backgroundColor: 'rgba(59, 130, 246, 0.1)',
              fill: true,
              tension: 0.3,
              pointRadius: 0,
              pointHoverRadius: 4
            },
            {
              label: 'AI Predicted',
              data: predData,
              borderColor: '#8b5cf6',
              borderDash: [5, 5],
              tension: 0.3,
              pointRadius: 0,
              pointHoverRadius: 4,
              fill: false
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 600 },
          plugins: {
            legend: { position: 'bottom', labels: { usePointStyle: true, pointStyle: 'line', padding: 16, color: chartTextColor } }
          },
          scales: {
            y: { min: 0, max: 100, ticks: { stepSize: 20, color: chartTextColor }, grid: { color: chartGridColor } },
            x: { ticks: { maxTicksLimit: 8, maxRotation: 0, color: chartTextColor }, grid: { color: chartGridColor } }
          }
        }
      });
    }
  }, 50);
}

// ==========================================
// NAVIGATION
// ==========================================
function showScreen(screenName) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));

  if (screenName === 'user-detail') {
    document.getElementById('screen-user-detail').classList.add('active');
    return;
  }

  // Clean up user detail chart when navigating away
  if (screenName === 'dashboard' || screenName === 'alerts') {
    userTrendChart = null;
  }

  document.getElementById(`screen-${screenName}`).classList.add('active');
  const tab = document.querySelector(`[data-tab="${screenName}"]`);
  if (tab) tab.classList.add('active');
}

document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    showScreen(tab.dataset.tab);
  });
});

// ==========================================
// SIMULATED AI SCORING UPDATES
// ==========================================
function simulateScoreUpdate() {
  const idx = Math.floor(Math.random() * users.length);
  const user = users[idx];
  const change = Math.round((Math.random() * 12 - 6) * (user.kyc.status === 'expired' ? 1.5 : 1));
  user.riskScore = Math.max(5, Math.min(95, user.riskScore + change));
  user.riskTier = getRiskTier(user.riskScore);
  user.trendDirection = getTrendDirection(user.trendData);
  user.trendData.push({ date: formatDate(now), score: user.riskScore });
  user.trendData = user.trendData.slice(-31);
  user.lastUpdated = new Date();

  if (user.riskScore >= 50 && !alerts.find(a => a.userId === user.id && !a.acknowledged)) {
    alerts.unshift({
      id: `ALT-${String(alerts.length + 1).padStart(4, '0')}`,
      userId: user.id,
      userName: user.name,
      userScore: user.riskScore,
      severity: user.riskScore >= 75 ? 'critical' : 'high',
      reason: 'Risk score increased — AI adaptive scoring detected anomaly',
      aiAction: getAIRecommendation(user).action,
      timestamp: new Date(),
      acknowledged: false
    });
  }
}

function refreshScores() {
  for (let i = 0; i < 3; i++) simulateScoreUpdate();
  renderAll();
}

function renderAll() {
  renderStats();
  renderCharts();
  renderTable();
  renderAlerts();

  // If currently viewing user detail, refresh it with updated data
  const detailScreen = document.getElementById('screen-user-detail');
  if (detailScreen.classList.contains('active')) {
    const nameEl = document.querySelector('.detail-name');
    if (nameEl) {
      const fullName = nameEl.textContent;
      const user = users.find(u => u.name === fullName);
      if (user) showUserDetail(user.id);
    }
  }
}

// Initial render
renderAll();

// Simulate AI updates every 8 seconds
setInterval(() => {
  simulateScoreUpdate();
  renderAll();
}, 8000);
</script>
