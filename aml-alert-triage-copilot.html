<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-dark: #0f1117;
  --bg-card: #1a1d27;
  --bg-hover: #252836;
  --border: #2d3148;
  --text-primary: #f0f0f5;
  --text-secondary: #9ca3b8;
  --text-muted: #6b7280;
  --accent-blue: #3b82f6;
  --accent-green: #10b981;
  --accent-amber: #f59e0b;
  --accent-red: #ef4444;
  --accent-purple: #8b5cf6;
  --accent-orange: #f97316;
  --accent-teal: #14b8a6;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --radius: 12px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; overflow: hidden; }

/* Header */
.header { height: 64px; background: var(--bg-card); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
.header-logo { font-size: 20px; font-weight: 700; color: var(--accent-blue); letter-spacing: -0.5px; }
.header-logo span { color: var(--text-primary); }
.header-divider { width: 1px; height: 24px; background: var(--border); margin: 0 16px; }
.header-title { font-size: 14px; color: var(--text-secondary); font-weight: 500; }
.header-badge { margin-left: auto; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); color: white; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }

/* Main Layout */
.main-layout { display: flex; position: absolute; top: 64px; left: 0; right: 0; bottom: 0; }

/* Left Sidebar - Alert Inbox */
.alert-sidebar { width: 280px; min-width: 280px; background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
.sidebar-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.sidebar-title-count { background: var(--accent-red); color: white; font-size: 11px; padding: 2px 6px; border-radius: 10px; font-weight: 600; }
.search-input { width: 100%; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text-primary); font-size: 13px; outline: none; transition: border-color 0.2s; }
.search-input:focus { border-color: var(--accent-blue); }
.search-input::placeholder { color: var(--text-muted); }
.filter-chips { display: flex; gap: 6px; padding: 12px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.filter-chip { padding: 4px 10px; border-radius: 16px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); transition: all 0.2s; }
.filter-chip:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
.filter-chip.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }
.alert-list { flex: 1; overflow-y: auto; padding: 8px; }
.alert-card { padding: 12px; border-radius: 8px; cursor: pointer; transition: all 0.2s; margin-bottom: 4px; border: 1px solid transparent; }
.alert-card:hover { background: var(--bg-hover); }
.alert-card.active { background: var(--bg-hover); border-color: var(--accent-blue); }
.alert-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.severity-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.severity-critical { background: var(--accent-red); box-shadow: 0 0 0 2px rgba(239,68,68,0.2); }
.severity-high { background: var(--accent-orange); box-shadow: 0 0 0 2px rgba(249,115,22,0.2); }
.severity-medium { background: var(--accent-amber); box-shadow: 0 0 0 2px rgba(245,158,11,0.2); }
.alert-type-icon { font-size: 14px; flex-shrink: 0; }
.alert-customer { font-size: 13px; font-weight: 600; flex: 1; }
.alert-status-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
.status-pending { background: rgba(59,130,246,0.2); color: var(--accent-blue); }
.status-dismissed { background: rgba(16,185,129,0.2); color: var(--accent-green); }
.status-escalated { background: rgba(239,68,68,0.2); color: var(--accent-red); }
.status-edd { background: rgba(139,92,246,0.2); color: var(--accent-purple); }
.alert-type-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; padding-left: 16px; }
.alert-meta { display: flex; justify-content: space-between; padding-left: 16px; }
.alert-time { font-size: 11px; color: var(--text-muted); }
.alert-risk { font-size: 11px; font-weight: 600; }

/* Center - Chat Panel */
.chat-panel { flex: 1; display: flex; flex-direction: column; background: var(--bg-dark); min-width: 0; }
.chat-header { padding: 12px 20px; background: var(--bg-card); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.chat-header-title { font-size: 14px; font-weight: 600; }
.chat-header-subtitle { font-size: 12px; color: var(--text-muted); }
.ai-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
.chat-messages { flex: 1; overflow-y: auto; padding: 20px; }
.message { display: flex; gap: 10px; margin-bottom: 20px; animation: fadeSlideIn 0.3s ease; }
.message-user { flex-direction: row-reverse; }
@keyframes fadeSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; }
.msg-avatar-ai { background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); }
.msg-avatar-user { background: var(--bg-hover); color: var(--text-secondary); }
.msg-content { max-width: 75%; }
.msg-bubble { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
.msg-ai .msg-bubble { background: var(--bg-card); border: 1px solid var(--border); border-top-left-radius: 4px; }
.msg-user .msg-bubble { background: linear-gradient(135deg, var(--accent-blue), #2563eb); border-top-right-radius: 4px; }
.msg-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.msg-action-btn { padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--bg-hover); color: var(--text-secondary); transition: all 0.2s; }
.msg-action-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
.msg-action-btn.danger { border-color: rgba(239,68,68,0.3); color: var(--accent-red); }
.msg-action-btn.danger:hover { background: rgba(239,68,68,0.1); }
.msg-action-btn.success { border-color: rgba(16,185,129,0.3); color: var(--accent-green); }
.msg-action-btn.success:hover { background: rgba(16,185,129,0.1); }
.msg-action-btn.primary { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }
.msg-action-btn.primary:hover { background: #2563eb; }
.msg-viz { margin-top: 12px; }

/* Quick Action Chips */
.quick-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.quick-chip { padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px dashed var(--border); background: transparent; color: var(--text-muted); transition: all 0.2s; }
.quick-chip:hover { border-color: var(--accent-blue); color: var(--accent-blue); border-style: solid; }

/* Typing Indicator */
.typing-indicator { display: flex; gap: 4px; padding: 12px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; border-top-left-radius: 4px; width: fit-content; }
.typing-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); animation: typingBounce 1.2s infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }

/* Chat Input */
.chat-input-area { padding: 16px 20px; background: var(--bg-card); border-top: 1px solid var(--border); }
.chat-suggestions { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.suggestion-btn { padding: 4px 10px; border-radius: 14px; font-size: 11px; cursor: pointer; border: 1px solid var(--border); background: var(--bg-hover); color: var(--text-muted); transition: all 0.2s; }
.suggestion-btn:hover { border-color: var(--accent-purple); color: var(--accent-purple); }
.chat-input-row { display: flex; gap: 8px; }
.chat-input { flex: 1; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text-primary); font-size: 14px; outline: none; transition: border-color 0.2s; }
.chat-input:focus { border-color: var(--accent-blue); }
.chat-input::placeholder { color: var(--text-muted); }
.send-btn { width: 40px; height: 40px; border-radius: 8px; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
.send-btn:hover { transform: scale(1.05); }

/* Right Sidebar - Detail Panel */
.detail-panel { width: 340px; min-width: 340px; background: var(--bg-card); border-left: 1px solid var(--border); display: none; flex-direction: column; overflow-y: auto; }
.detail-panel.visible { display: flex; }
.detail-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.detail-title { font-size: 14px; font-weight: 600; }
.detail-close { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; font-size: 18px; }
.detail-close:hover { color: var(--text-primary); }
.detail-content { padding: 16px; }
.detail-section { margin-bottom: 20px; }
.detail-section-title { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.detail-field { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
.detail-field:last-child { border-bottom: none; }
.detail-field-label { font-size: 13px; color: var(--text-secondary); }
.detail-field-value { font-size: 13px; font-weight: 600; }
.risk-bar-container { margin-bottom: 10px; }
.risk-bar-header { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 13px; }
.risk-bar-track { height: 6px; background: var(--bg-hover); border-radius: 3px; overflow: hidden; }
.risk-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.tx-table { width: 100%; font-size: 12px; border-collapse: collapse; }
.tx-table th { text-align: left; padding: 6px 4px; color: var(--text-muted); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 11px; }
.tx-table td { padding: 6px 4px; border-bottom: 1px solid var(--border); }
.evidence-card { padding: 10px; background: var(--bg-hover); border-radius: 8px; margin-bottom: 8px; border-left: 3px solid var(--accent-blue); }
.evidence-card-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.evidence-card-desc { font-size: 12px; color: var(--text-secondary); }

/* Inline Viz Styles */
.risk-factor-chart { background: var(--bg-hover); border-radius: 8px; padding: 12px; margin-top: 10px; }
.mini-tx-table { width: 100%; font-size: 12px; margin-top: 10px; }
.mini-tx-table th { text-align: left; padding: 6px 8px; color: var(--text-muted); font-weight: 500; border-bottom: 1px solid var(--border); background: var(--bg-hover); font-size: 11px; }
.mini-tx-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
.mini-network-graph { width: 100%; height: 180px; margin-top: 10px; border-radius: 8px; overflow: hidden; background: var(--bg-hover); }
.evidence-table { width: 100%; font-size: 12px; margin-top: 10px; border-collapse: collapse; }
.evidence-table th { text-align: left; padding: 6px 8px; color: var(--text-muted); font-weight: 500; border-bottom: 1px solid var(--border); background: var(--bg-hover); font-size: 11px; }
.evidence-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
.score-pill { display: inline-block; padding: 3px 8px; border-radius: 4px; font-weight: 600; font-size: 12px; }
.score-high { background: rgba(239,68,68,0.2); color: var(--accent-red); }
.score-medium { background: rgba(245,158,11,0.2); color: var(--accent-amber); }
.score-low { background: rgba(16,185,129,0.2); color: var(--accent-green); }
.badge-pep { background: rgba(139,92,246,0.2); color: var(--accent-purple); }
.badge-sanctions { background: rgba(239,68,68,0.2); color: var(--accent-red); }
.badge-jurisdiction { background: rgba(249,115,22,0.2); color: var(--accent-orange); }

/* Toast */
.toast-notification {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
  background: var(--accent-green); color: white; padding: 10px 20px; border-radius: 8px;
  font-size: 13px; font-weight: 600; opacity: 0; transition: all 0.3s ease;
  z-index: 999; pointer-events: none; box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.toast-notification.toast-show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Investigation step card */
.investigation-step {
  background: var(--bg-hover); border-radius: 8px; padding: 14px; margin-bottom: 10px;
  border-left: 3px solid var(--accent-blue);
}
.investigation-step.completed { border-left-color: var(--accent-green); }
.investigation-step.current { border-left-color: var(--accent-amber); background: rgba(245,158,11,0.05); }
.investigation-step-header { font-size: 13px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.investigation-step-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
.investigation-progress { margin-bottom: 16px; }
.step-dots { display: flex; gap: 8px; margin-bottom: 8px; }
.step-dot { width: 24px; height: 4px; border-radius: 2px; background: var(--bg-hover); transition: background 0.3s; }
.step-dot.active { background: var(--accent-amber); }
.step-dot.done { background: var(--accent-green); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border); }

/* Responsive */
@media (max-width: 1024px) { .detail-panel { width: 300px; min-width: 300px; } .alert-sidebar { width: 240px; min-width: 240px; } }
@media (max-width: 768px) { .main-layout { flex-direction: column; } .alert-sidebar, .detail-panel { width: 100%; min-width: 100%; max-height: 40vh; } }
</style>

// Toast notification
function showToast(message) {
  const toast = document.createElement('div');

// RENDER ALERT INBOX
// ============================================================
function renderAlertList() {
  const listEl = document.getElementById('alert-list');
  const searchTerm = document.getElementById('alert-search').value.toLowerCase();
  let filtered = alerts.filter(a => {
    if (currentFilter === 'critical' && a.severity !== 'critical') return false;
    if (currentFilter === 'high' && a.severity !== 'high') return false;
    if (currentFilter === 'medium' && a.severity !== 'medium') return false;
    if (currentFilter === 'pending' && a.status !== 'pending') return false;
    if (searchTerm && !a.customer.name.toLowerCase().includes(searchTerm) && !a.alertType.toLowerCase().includes(searchTerm) && !a.id.toLowerCase().includes(searchTerm)) return false;
    return true;
  });

  let html = '';
  filtered.sort((a, b) => {
    const severityOrder = { critical: 0, high: 1, medium: 2 };
    return severityOrder[a.severity] - severityOrder[b.severity];
  });

  filtered.forEach(alert => {
    const statusClass = `status-${alert.status}`;
    const hoursAgo = Math.floor((Date.now() - alert.timestamp) / 3600000);
    const timeStr = hoursAgo === 0 ? 'Just now' : hoursAgo === 1 ? '1h ago' : `${hoursAgo}h ago`;
    const typeIcons = { 'Sanctions Hit': '&#x26A0;', 'Structuring': '&#x1F4B5;', 'PEP Match': '&#x1F464;', 'Rapid Movement': '&#x26A1;', 'Volume Spike': '&#x1F4C8;', 'Shell Company': '&#x1F3E2;', 'Layering': '&#x1F504;', 'Cash-Intensive': '&#x1F4B0;', 'High-Risk Jurisdiction': '&#x1F30D;', 'Sanctions + Dormant': '&#x1F6AB;' };
    const isActive = activeAlert && activeAlert.id === alert.id;

    html += `<div class="alert-card ${isActive ? 'active' : ''}" onclick="selectAlert('${alert.id}')">
      <div class="alert-card-top">
        <div class="severity-dot severity-${alert.severity}"></div>
        <span class="alert-type-icon">${typeIcons[alert.alertType] || '&#x1F4CB;'}</span>
        <span class="alert-customer">${alert.customer.name}</span>
        <span class="alert-status-badge ${statusClass}">${alert.status}</span>
      </div>
      <div class="alert-type-label">${alert.alertType}</div>
      <div class="alert-meta">
        <span class="alert-time">${timeStr}</span>
        <span class="alert-risk" style="color: ${alert.riskScore >= 80 ? 'var(--accent-red)' : alert.riskScore >= 60 ? 'var(--accent-amber)' : 'var(--accent-green)'}">Score: ${alert.riskScore}</span>
      </div>
    </div>`;
  });

  if (filtered.length === 0) {
    html = '<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:13px;">No alerts match your filters</div>';
  }

  listEl.innerHTML = html;
  document.getElementById('pending-count').textContent = alerts.filter(a => a.status === 'pending').length;
}

// CHAT SYSTEM

const chatMessages = document.getElementById('chat-messages');
const chatInput = document.getElementById('chat-input');
const chatSuggestions = document.getElementById('chat-suggestions');

function addMessage(role, content, actions = null, viz = null) {
  const msg = document.createElement('div');
  msg.className = `message message-${role}`;

  const avatar = document.createElement('div');
  avatar.className = `msg-avatar msg-avatar-${role}`;
  avatar.textContent = role === 'ai' ? 'AI' : 'You';
  msg.appendChild(avatar);

  const contentDiv = document.createElement('div');
  contentDiv.className = 'msg-content';

  const bubble = document.createElement('div');
  bubble.className = `msg-bubble msg-${role}`;
  bubble.innerHTML = content;
  contentDiv.appendChild(bubble);

  if (viz) {
    const vizDiv = document.createElement('div');
    vizDiv.className = 'msg-viz';
    vizDiv.innerHTML = viz;
    contentDiv.appendChild(vizDiv);
  }

  if (actions) {
    const actionsDiv = document.createElement('div');
    actionsDiv.className = 'msg-actions';
    actions.forEach(a => {
      const btn = document.createElement('button');
      btn.className = `msg-action-btn ${a.class || ''}`;
      btn.textContent = a.label;
      btn.onclick = () => {
        if (a.action) a.action();
        btn.style.opacity = '0.5';
        btn.style.pointerEvents = 'none';
      };
      actionsDiv.appendChild(btn);
    });
    contentDiv.appendChild(actionsDiv);
  }

  msg.appendChild(contentDiv);
  chatMessages.appendChild(msg);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return bubble;
}

function showTyping() {
  const msg = document.createElement('div');
  msg.className = 'message message-ai';
  msg.id = 'typing-msg';
  msg.innerHTML = `<div class="msg-avatar msg-avatar-ai">AI</div><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  chatMessages.appendChild(msg);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing-msg');
  if (el) el.remove();
}

function renderMarkdown(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code style="background:var(--bg-hover);padding:1px 4px;border-radius:3px;font-size:12px;">$1</code>')
    .replace(/\n/g, '<br>');
}

async function streamText(bubble, text, speed = 12) {
  bubble.innerHTML = '';
  const chars = [];
  for (let i = 0; i < text.length; i++) {
    chars.push(text[i]);
    bubble.innerHTML = renderMarkdown(chars.join(''));
    chatMessages.scrollTop = chatMessages.scrollHeight;
    if (i % 3 === 0) await new Promise(r => setTimeout(r, speed));
  }
  bubble.innerHTML = renderMarkdown(text);
}

function setSuggestions(suggestions) {
  chatSuggestions.innerHTML = suggestions.map(s => `<button class="suggestion-btn" onclick="sendSuggestion('${s}')">${s}</button>`).join('');
}

function sendSuggestion(text) {
  chatInput.value = text;
  handleSend();
}

async function handleSend() {
  const text = chatInput.value.trim();
  if (!text) return;
  chatInput.value = '';
  addMessage('user', text);
  conversationHistory.push({ role: 'user', text });

  showTyping();
  await new Promise(r => setTimeout(r, 800 + Math.random() * 600));
  hideTyping();

  const response = processInput(text);
  const bubble = addMessage('ai', '');
  await streamText(bubble, response.text, 10);

  if (response.actions) {
    const msgEl = bubble.closest('.message');
    const actionsDiv = document.createElement('div');
    actionsDiv.className = 'msg-actions';
    response.actions.forEach(a => {
      const btn = document.createElement('button');
      btn.className = `msg-action-btn ${a.class || ''}`;
      btn.textContent = a.label;
      btn.onclick = () => {
        if (a.action) a.action();
        btn.style.opacity = '0.5';
        btn.style.pointerEvents = 'none';
      };
      actionsDiv.appendChild(btn);
    });
    msgEl.querySelector('.msg-content').appendChild(actionsDiv);
  }

  if (response.viz) {
    const msgEl = bubble.closest('.message');
    const vizDiv = document.createElement('div');
    vizDiv.className = 'msg-viz';
    vizDiv.innerHTML = response.viz;
    msgEl.querySelector('.msg-content').appendChild(vizDiv);
    // Render D3 graphs if needed
    if (response.viz && response.viz.includes('mini-network-')) {
      renderMiniNetworkGraph(response.viz);
    }
  }

  if (response.suggestions) {
    setSuggestions(response.suggestions);
  }

  conversationHistory.push({ role: 'ai', text: response.text });
}

document.getElementById('send-btn').addEventListener('click', handleSend);
chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });

// ============================================================
// RESPONSE ENGINE
// ============================================================
function processInput(text) {
  const lower = text.toLowerCase();

  // Alert-specific queries
  if (activeAlert) {
    if (lower === 'next step' || lower === 'next' || lower === 'continue') {
      if (investigationStep > 0 && investigationStep < 4) {
        showInvestigationStep(activeAlert, investigationStep + 1);
        return { text: '', suggestions: [] };
      }
      if (investigationStep === 4) {
        return { text: 'Investigation complete. You can now draft a SAR, escalate, or dismiss this alert.', suggestions: ['Draft SAR', 'Escalate', 'Dismiss as false positive'] };
      }
    }
    if (lower.includes('why') || lower.includes('flagged') || lower.includes('reason') || lower.includes('trigger')) {
      return getWhyFlaggedResponse(activeAlert);
    }
    if (lower.includes('transaction') || lower.includes('transfer') || lower.includes('payment')) {
      return getTransactionResponse(activeAlert);
    }
    if (lower.includes('risk') || lower.includes('score')) {
      return getRiskResponse(activeAlert);
    }
    if (lower.includes('investigat') || lower.includes('deep') || lower.includes('more about')) {
      return getInvestigationResponse(activeAlert);
    }
    if (lower.includes('pattern') || lower.includes('similar') || lower.includes('connect')) {
      return getPatternResponse(activeAlert);
    }
    if (lower.includes('evidence') || lower.includes('proof') || lower.includes('support')) {
      return getEvidenceResponse(activeAlert);
    }
  }

  // General queries
  if (lower.includes('next alert') || lower.includes('next highest') || lower.includes('show next')) {
    return getNextAlertResponse();
  }
  if (lower.includes('investigate aml') || lower.includes('show me aml') || lower.includes('open aml')) {
    const match = lower.match(/aml[- ]?(\d+)/);
    if (match) {
      const alert = alerts.find(a => a.id.toLowerCase() === `aml-${match[1].padStart(3, '0')}`);
      if (alert) {
        activeAlert = alert;
        renderAlertList();
        showDetailPanel(alert);
        return getAlertSummaryResponse(alert);
      }
    }
  }
  if (lower.includes('pattern') || lower.includes('trend') || lower.includes('overview')) {
    return getGeneralPatternResponse();
  }
  if (lower.includes('dismiss') || lower.includes('close') || lower.includes('false positive')) {
    if (activeAlert) {
      dismissAlert(activeAlert);
      return { text: `Alert ${activeAlert.id} has been dismissed. What would you like to do next?`, suggestions: ['Next alert', 'Show me patterns'] };
    }
    return { text: 'I can help dismiss an alert. Please select an alert from the sidebar first, then I can process the dismissal for you.', suggestions: ['Why was this flagged?', 'Show me the evidence', 'Show risk breakdown'] };
  }
  if (lower.includes('escalat')) {
    return { text: 'Escalation requires an active alert context. Click an alert in the sidebar and I can escalate it with full justification.', suggestions: ['Why was this flagged?', 'Show me the evidence'] };
  }
  if (lower.includes('sar') || lower.includes('file')) {
    return { text: 'To prepare a SAR (Suspicious Activity Report), I need an alert context first. Select an alert and ask me to investigate — I will then draft a SAR narrative with all supporting evidence.', suggestions: ['Start investigation', 'Show me patterns'] };
  }
  if (lower.includes('edd') || lower.includes('enhanced due diligence')) {
    return { text: 'Enhanced Due Diligence is recommended for alerts with risk scores above 70. Select a high-risk alert and I can initiate EDD with a structured checklist.', suggestions: ['Show risk breakdown', 'Start investigation'] };
  }
  if (lower.includes('hello') || lower.includes('hi') || lower.includes('hey')) {
    return { text: 'Hello! I\'m your AML Triage Copilot. I can help you review alerts, analyze patterns, investigate suspicious activity, and prepare SAR filings. Try selecting an alert from the sidebar to get started, or ask me about patterns across alerts.', suggestions: ['Show me patterns', 'What are the highest risk alerts?', 'Start investigation'] };
  }
  if (lower.includes('help')) {
    return { text: 'Here is what I can help with:\n\n**Alert Triage** — Select an alert and ask me to analyze it\n**Why Flagged?** — I explain the specific triggers and evidence\n**Transaction Analysis** — I review transaction patterns\n**Risk Breakdown** — I show how risk scores are calculated\n**Pattern Analysis** — I find cross-alert patterns and connections\n**Investigation** — I guide you through evidence gathering\n**SAR Filing** — I draft Suspicious Activity Reports\n\nTry clicking an alert in the sidebar!', suggestions: ['Show me patterns', 'What are the highest risk alerts?'] };
  }

  // Default: try to match customer names
  for (const alert of alerts) {
    if (lower.includes(alert.customer.name.toLowerCase().split(' ')[0].toLowerCase())) {
      if (activeAlert && activeAlert.id === alert.id) {
        return getInvestigationResponse(alert);
      }
      activeAlert = alert;
      renderAlertList();
      return getAlertSummaryResponse(alert);
    }
  }

  return { text: 'I\'m not sure I understand. Try selecting an alert from the sidebar, or ask me about patterns, risk scores, or investigations. You can also type "help" for a full list of capabilities.', suggestions: ['Help', 'Show me patterns', 'What are the highest risk alerts?'] };
}

function getAlertSummaryResponse(alert) {
  activeAlert = alert;
  renderAlertList();
  showDetailPanel(alert);
  return {
    text: `Alert **${alert.id}** — ${alert.alertType}\n\nCustomer: ${alert.customer.name} (${alert.customer.id})\nRisk Score: ${alert.riskScore}/100 | Severity: ${alert.severity.toUpperCase()}\n\n${alert.aiSummary}\n\nWhat would you like to explore?`,
    actions: [
      { label: 'Dismiss', class: 'success', action: () => dismissAlert(alert) },
      { label: 'Escalate', class: 'danger', action: () => escalateAlert(alert) },
      { label: 'Request EDD', class: '', action: () => eddAlert(alert) }
    ],
    suggestions: ['Why was this flagged?', 'Show risk breakdown', 'Show transactions', 'Start investigation']
  };
}

function getWhyFlaggedResponse(alert) {
  let vizHtml = '<table class="mini-tx-table"><thead><tr><th>Trigger</th><th>Score</th><th>Detail</th></tr></thead><tbody>';
  alert.riskFactors.forEach(f => {
    const color = f.value >= 80 ? 'var(--accent-red)' : f.value >= 60 ? 'var(--accent-amber)' : 'var(--accent-green)';
    vizHtml += `<tr><td>${f.name}</td><td><span class="score-pill ${f.value >= 80 ? 'score-high' : f.value >= 60 ? 'score-medium' : 'score-low'}">${f.value}</span></td><td style="color:var(--text-secondary)">${f.value >= 80 ? 'Critical' : f.value >= 60 ? 'Elevated' : 'Moderate'}</td></tr>`;
  });
  vizHtml += '</tbody></table>';

  return {
    text: `This alert was triggered by ${alert.riskFactors.length} risk factors:\n\n` + alert.riskFactors.map(f => `**${f.name}**: Score ${f.value}/100`).join('\n') + `\n\nThe combined risk score is ${alert.riskScore}/100. Here is the breakdown:`,
    viz: vizHtml,
    suggestions: ['Show transactions', 'Show evidence', 'Start investigation']
  };
}

function getTransactionResponse(alert) {
  let vizHtml = '<table class="mini-tx-table"><thead><tr><th>Date</th><th>Amount</th><th>Dir</th><th>Counterparty</th><th>Country</th></tr></thead><tbody>';
  alert.transactions.forEach(tx => {
    const color = tx.direction === 'IN' ? 'var(--accent-green)' : 'var(--accent-red)';
    vizHtml += `<tr><td>${tx.date}</td><td style="font-weight:600;color:${color}">${tx.direction === 'IN' ? '+' : '-'}${tx.currency} ${tx.amount.toLocaleString()}</td><td>${tx.direction}</td><td>${tx.counterparty}</td><td>${tx.country}</td></tr>`;
  });
  vizHtml += '</tbody></table>';

  const totalIn = alert.transactions.filter(t => t.direction === 'IN').reduce((s, t) => s + t.amount, 0);
  const totalOut = alert.transactions.filter(t => t.direction === 'OUT').reduce((s, t) => s + t.amount, 0);

  return {
    text: `${alert.customer.name} has ${alert.transactions.length} recent transactions:\n\nTotal Inbound: ${alert.transactions[0]?.currency || 'USD'} ${totalIn.toLocaleString()}\nTotal Outbound: ${alert.transactions[0]?.currency || 'USD'} ${totalOut.toLocaleString()}\nNet Flow: ${alert.transactions[0]?.currency || 'USD'} ${(totalIn - totalOut).toLocaleString()}\n\n${alert.transactions.length >= 4 ? 'High transaction frequency is notable. ' : ''}See details below:`,
    viz: vizHtml,
    suggestions: ['Why was this flagged?', 'Show risk breakdown', 'Start investigation']
  };
}

function getRiskResponse(alert) {
  let vizHtml = '<div class="risk-factor-chart">';
  alert.riskFactors.forEach(f => {
    const color = f.value >= 80 ? 'var(--accent-red)' : f.value >= 60 ? 'var(--accent-amber)' : 'var(--accent-green)';
    vizHtml += `<div class="risk-bar-container"><div class="risk-bar-header"><span>${f.name}</span><span style="color:${color}">${f.value}%</span></div><div class="risk-bar-track"><div class="risk-bar-fill" style="width:${f.value}%;background:${color}"></div></div></div>`;
  });
  vizHtml += '</div>';

  return {
    text: `Risk breakdown for ${alert.customer.name} (Score: ${alert.riskScore}/100):\n\n` + alert.riskFactors.map(f => `${f.name}: ${f.value}%`).join('\n') + `\n\nThe overall score is a weighted composite. Here is the visual breakdown:`,
    viz: vizHtml,
    suggestions: ['Show transactions', 'Why was this flagged?', 'Start investigation']
  };
}

function getInvestigationResponse(alert) {
  activeAlert = alert;
  investigationStep = 1;
  showDetailPanel(alert);
  return {
    text: `Investigation initiated for **${alert.id}** — ${alert.alertType}\n\nI will guide you through a structured 4-step investigation. Let's start:`,
    actions: [
      { label: 'Step 1: Review Profile', class: 'primary', action: () => showInvestigationStep(alert, 1) },
      { label: 'Step 2: Transactions', class: '', action: () => showInvestigationStep(alert, 2) },
      { label: 'Step 3: Cross-References', class: '', action: () => showInvestigationStep(alert, 3) },
      { label: 'Step 4: Evidence', class: '', action: () => showInvestigationStep(alert, 4) }
    ],
    suggestions: ['Review profile', 'Show transactions', 'Cross-reference check', 'Show evidence']
  };
}

function showInvestigationStep(alert, step) {
  investigationStep = step;
  const stepData = [
    null,
    {
      title: 'Step 1: Customer Profile Review',
      text: `**Customer:** ${alert.customer.name}\n**ID:** ${alert.customer.id}\n**Jurisdiction:** ${alert.customer.jurisdiction}\n**KYC Status:** ${alert.customer.kycStatus}\n**PEP:** ${alert.customer.pep ? 'Yes — CONFIRMED' : 'No'}\n**Risk Score:** ${alert.riskScore}/100\n\n${alert.customer.pep ? 'PEP status requires enhanced scrutiny. Verify politically exposed position and source of wealth.' : 'Customer is not a PEP, but jurisdiction-based risk may apply.'}`,
      viz: null
    },
    {
      title: 'Step 2: Transaction Pattern Analysis',
      text: `**Transaction Summary:**\n${alert.aiSummary}\n\n**Key observations:**\n• ${alert.transactions.length} transactions analyzed\n• Inbound: ${alert.transactions.filter(t => t.direction === 'IN').reduce((s,t) => s + t.amount, 0).toLocaleString()} ${alert.transactions[0]?.currency}\n• Outbound: ${alert.transactions.filter(t => t.direction === 'OUT').reduce((s,t) => s + t.amount, 0).toLocaleString()} ${alert.transactions[0]?.currency}\n• Jurisdictions involved: ${[...new Set(alert.transactions.map(t => t.country))].join(', ')}`,
      viz: (() => { let h = '<table class="mini-tx-table"><thead><tr><th>Date</th><th>Amount</th><th>Dir</th><th>To/From</th><th>Country</th></tr></thead><tbody>'; alert.transactions.forEach(tx => { const c = tx.direction === 'IN' ? 'var(--accent-green)' : 'var(--accent-red)'; h += `<tr><td>${tx.date}</td><td style="font-weight:600;color:${c}">${tx.direction === 'IN' ? '+' : '-'}${tx.currency} ${tx.amount.toLocaleString()}</td><td>${tx.direction}</td><td style="font-size:11px">${tx.counterparty}</td><td style="font-size:11px">${tx.country}</td></tr>`; }); h += '</tbody></table>'; return h; })()
    },
    {
      title: 'Step 3: Cross-Reference Check',
      text: `${alert.linkedAlerts.length > 0 ? `**Linked Alerts Found:** ${alert.linkedAlerts.length}\n\n` + alert.linkedAlerts.map(id => { const linked = alerts.find(a => a.id === id); return linked ? `• **${id}** — ${linked.customer.name} (${linked.alertType}): Shares counterparties or behavioral patterns.` : ''; }).join('\n') + '\n\nShared entities suggest potential coordinated activity.' : 'No directly linked alerts found in the current dataset. No cross-references detected.'}\n\nSee network visualization:`,
      viz: alert.linkedAlerts.length > 0 ? `<div class="mini-network-graph" id="network-${alert.id}"></div>` : null
    },
    {
      title: 'Step 4: Evidence Summary',
      text: `**${alert.evidence.length} evidence items collected:**\n\n${alert.evidence.map(e => `• **[${e.type}]** ${e.desc}`).join('\n')}\n\n**Assessment:** ${alert.riskScore >= 85 ? 'Evidence threshold for SAR filing is met. Multiple high-confidence indicators present.' : alert.riskScore >= 70 ? 'Sufficient evidence for escalation. SAR filing recommended after additional verification.' : 'Evidence is moderate. Consider gathering additional data before SAR filing.'}`,
      viz: (() => { let h = '<table class="evidence-table"><thead><tr><th>Type</th><th>Description</th></tr></thead><tbody>'; alert.evidence.forEach(e => { h += `<tr><td><span class="badge-${e.type.toLowerCase().includes('sanction') ? 'sanctions' : e.type.toLowerCase().includes('pep') ? 'pep' : 'jurisdiction'}">${e.type}</span></td><td>${e.desc}</td></tr>`; }); h += '</tbody></table>'; return h; })()
    }
  ];

  const data = stepData[step];
  addMessage('ai', data.text,
    step === 4
      ? [
          { label: 'Draft SAR', class: 'primary', action: () => draftSAR(alert) },
          { label: 'Escalate', class: 'danger', action: () => escalateAlert(alert) },
          { label: 'Request EDD', class: '', action: () => eddAlert(alert) }
        ]
      : null,
    data.viz
  );

  if (step < 4) {
    setSuggestions(['Next step', 'Show transactions', 'Show risk breakdown', 'Draft SAR']);
  } else {
    setSuggestions(['Draft SAR', 'Escalate', 'Dismiss as false positive']);
  }
}

function getPatternResponse(alert) {
  if (alert.linkedAlerts.length === 0) {
    return { text: `No directly linked alerts found for ${alert.customer.name}. However, I can run a broader pattern analysis across all alerts. Would you like me to do that?`, suggestions: ['Show me patterns', 'Show risk breakdown'] };
  }
  return {
    text: `Pattern analysis for ${alert.customer.name}:\n\nThis alert is connected to ${alert.linkedAlerts.length} other alert(s):\n${alert.linkedAlerts.map(id => { const linked = alerts.find(a => a.id === id); return `• ${id}: ${linked ? linked.customer.name + ' (' + linked.alertType + ')' : 'Unknown'}`; }).join('\n')}\n\nShared entities and counterparties suggest potential coordinated activity. See network visualization:`,
    viz: `<div class="mini-network-graph" id="network-${alert.id}"></div>`,
    suggestions: ['Show me all patterns', 'Start investigation', 'Draft SAR']
  };
}

function getNextAlertResponse() {
  const pendingAlerts = alerts.filter(a => a.status === 'pending').sort((a, b) => b.riskScore - a.riskScore);
  if (pendingAlerts.length === 0) {
    return { text: 'All pending alerts have been reviewed. No more alerts to triage.', suggestions: ['Show me patterns', 'Help'] };
  }
  const nextAlert = pendingAlerts[0];
  activeAlert = nextAlert;
  renderAlertList();
  showDetailPanel(nextAlert);
  return {
    text: `Next highest priority alert: **${nextAlert.id}** — ${nextAlert.alertType}\n\nCustomer: ${nextAlert.customer.name} | Risk Score: ${nextAlert.riskScore}/100 | Severity: ${nextAlert.severity.toUpperCase()}\n\n${nextAlert.aiSummary}`,
    actions: [
      { label: 'Dismiss', class: 'success', action: () => dismissAlert(nextAlert) },
      { label: 'Escalate', class: 'danger', action: () => escalateAlert(nextAlert) },
      { label: 'Request EDD', class: '', action: () => eddAlert(nextAlert) }
    ],
    suggestions: ['Why was this flagged?', 'Show risk breakdown', 'Start investigation']
  };
}

function getEvidenceResponse(alert) {
  let vizHtml = '<table class="evidence-table"><thead><tr><th>Type</th><th>Description</th></tr></thead><tbody>';
  alert.evidence.forEach(e => {
    vizHtml += `<tr><td><span class="badge-${e.type.toLowerCase().includes('sanction') ? 'sanctions' : e.type.toLowerCase().includes('pep') ? 'pep' : 'jurisdiction'}">${e.type}</span></td><td>${e.desc}</td></tr>`;
  });
  vizHtml += '</tbody></table>';

  return {
    text: `Evidence collected for ${alert.id}:\n\n${alert.evidence.map(e => `[${e.type}] ${e.desc}`).join('\n\n')}`,
    viz: vizHtml,
    suggestions: ['Start investigation', 'Draft SAR', 'Show risk breakdown']
  };
}

function getGeneralPatternResponse() {
  const criticalCount = alerts.filter(a => a.severity === 'critical').length;
  const highCount = alerts.filter(a => a.severity === 'high').length;
  const mediumCount = alerts.filter(a => a.severity === 'medium').length;
  const avgRisk = Math.round(alerts.reduce((s, a) => s + a.riskScore, 0) / alerts.length);
  const pendingCount = alerts.filter(a => a.status === 'pending').length;
  const pebCount = alerts.filter(a => a.customer.pep).length;
  const linkedPairs = alerts.filter(a => a.linkedAlerts.length > 0).length;

  return {
    text: `Cross-Alert Pattern Analysis\n\n**Portfolio Overview:**\n• Total Alerts: ${alerts.length}\n• Pending Review: ${pendingCount}\n• Critical: ${criticalCount} | High: ${highCount} | Medium: ${mediumCount}\n• Average Risk Score: ${avgRisk}/100\n• PEP-Related: ${pebCount}\n• Linked Alert Pairs: ${linkedPairs}\n\n**Identified Patterns:**\n1. **Pass-Through Network**: AML-004 (Olympus Trading) and AML-001 (Dmitri Volkov) share counterparty "Meridian Holdings Ltd" in Cyprus. Funds appear to flow through UAE-based entities to offshore jurisdictions.\n2. **PEP-Shell Company Link**: AML-003 (Senator Santos) and AML-007 (Caribbean Holdings) are directly connected — a PEP transferring funds to a BVI shell company.\n3. **Dormant Reactivation**: AML-006 (Kuznetsova) shows classic dormant account reactivation with sanctions-proximate funds.\n4. **Commodity Layering**: AML-008 (Patel) uses precious metals trades across 4 jurisdictions in 4 days.\n\n**Recommended Priority Order:**\n1. AML-006 — Critical (Sanctions + PEP + Dormant)\n2. AML-001 — Critical (OFAC Match)\n3. AML-004 — High (Pass-Through, linked to AML-001)\n4. AML-003 — High (PEP + Adverse Media)`,
    suggestions: ['Investigate AML-006', 'Show me AML-001', 'Draft SAR for highest risk']
  };
}

function dismissAlert(alert) {
  alert.status = 'dismissed';
  activeAlert = null;
  document.getElementById('detail-panel').classList.remove('visible');
  renderAlertList();
  showToast(`Alert ${alert.id} dismissed as false positive`);
  addMessage('ai', `Alert ${alert.id} has been dismissed as a false positive. The status has been updated. What would you like to review next?`);
  setSuggestions(['Next alert', 'Show me patterns']);
}

function escalateAlert(alert) {
  alert.status = 'escalated';
  activeAlert = null;
  document.getElementById('detail-panel').classList.remove('visible');
  renderAlertList();
  showToast(`Alert ${alert.id} escalated to senior team`);
  addMessage('ai', `Alert ${alert.id} has been escalated for senior analyst review.\n\n**Escalation Summary:**\n• Alert: ${alert.id} — ${alert.alertType}\n• Customer: ${alert.customer.name}\n• Risk Score: ${alert.riskScore}/100\n• Severity: ${alert.severity.toUpperCase()}\n• Key Triggers: ${alert.riskFactors.map(f => f.name).join(', ')}\n\nA case has been created and assigned to the senior AML team. Recommended timeline: 24-hour review window.`);

    suggestions: ['Show evidence', 'Draft SAR', 'Next alert']);
}

function draftSAR(alert) {
  const sarText = `SAR Narrative Draft — ${alert.id}\n\n**Subject:** ${alert.customer.name}\n**Customer ID:** ${alert.customer.id}\n**Jurisdiction:** ${alert.customer.jurisdiction}\n**Alert Type:** ${alert.alertType}\n**Risk Score:** ${alert.riskScore}/100\n\n**Activity Summary:**\n${alert.aiSummary}\n\n**Supporting Evidence:**\n${alert.evidence.map(e => `• ${e.type}: ${e.desc}`).join('\n')}\n\n**Transaction Summary:**\n${alert.transactions.map(tx => `• ${tx.date}: ${tx.direction} ${tx.currency} ${tx.amount.toLocaleString()} to/from ${tx.counterparty} (${tx.country})`).join('\n')}\n\n**Recommendation:**\n${alert.riskScore >= 85 ? 'File SAR immediately. Evidence threshold met with multiple high-confidence indicators.' : alert.riskScore >= 70 ? 'File SAR recommended. Additional evidence gathering may strengthen the case.' : 'Monitor and gather additional evidence before SAR filing.'}\n\n**${alert.linkedAlerts.length > 0 ? 'Linked Alerts: ' + alert.linkedAlerts.join(', ') + ' should be referenced in the filing.' : 'No linked alerts to reference.'}**`;

  addMessage('ai', sarText, [
    { label: 'File SAR', class: 'primary', action: () => { addMessage('ai', `SAR for ${alert.id} has been prepared for filing. In a production system, this would be submitted to FinCAN/FinCEN. The case is now in "Ready for Submission" status.`); } },
    { label: 'Edit Narrative', class: '', action: () => { addMessage('ai', 'In a production system, the SAR narrative editor would open here for manual review and editing before submission.'); } }
  ]);
  setSuggestions(['File SAR', 'Show me patterns', 'Next alert']);
}

  let txHtml = '';

    txHtml = '<table class="tx-table"><thead><tr><th>Date</th><th>Amount</th><th>Dir</th><th>To/From</th></tr></thead><tbody>';
    alert.transactions.forEach(tx => {
      const color = tx.direction === 'IN' ? 'var(--accent-green)' : 'var(--accent-red)';
      txHtml += `<tr><td>${tx.date}</td><td style="color:${color};font-weight:600">${tx.currency} ${tx.amount.toLocaleString()}</td><td>${tx.direction}</td><td style="font-size:11px;color:var(--text-secondary)">${tx.counterparty}</td></tr>`;
    });
    txHtml += '</tbody></table>';
  }

  let riskHtml = '';
  alert.riskFactors.forEach(f => {
    const color = f.value >= 80 ? 'var(--accent-red)' : f.value >= 60 ? 'var(--accent-amber)' : 'var(--accent-green)';
    riskHtml += `<div class="risk-bar-container"><div class="risk-bar-header"><span>${f.name}</span><span style="color:${color}">${f.value}%</span></div><div class="risk-bar-track"><div class="risk-bar-fill" style="width:${f.value}%;background:${color}"></div></div></div>`;
  });

  let linkedHtml = '';
  if (alert.linkedAlerts.length > 0) {
    linkedHtml = alert.linkedAlerts.map(id => {
      const linked = alerts.find(a => a.id === id);
      return linked ? `<div style="padding:8px;background:var(--bg-hover);border-radius:6px;margin-bottom:4px;font-size:12px;cursor:pointer" onclick="selectAlert('${id}')">${id}: ${linked.customer.name} (${linked.alertType})</div>` : '';
    }).join('');
  }

  content.innerHTML = `
    <div class="detail-section">
      <div class="detail-section-title">Customer Profile</div>
      <div class="detail-field"><span class="detail-field-label">Name</span><span class="detail-field-value">${alert.customer.name}</span></div>
      <div class="detail-field"><span class="detail-field-label">ID</span><span class="detail-field-value">${alert.customer.id}</span></div>
      <div class="detail-field"><span class="detail-field-label">Jurisdiction</span><span class="detail-field-value">${alert.customer.jurisdiction}</span></div>
      <div class="detail-field"><span class="detail-field-label">KYC Status</span><span class="detail-field-value" style="color:${kycColor}">${alert.customer.kycStatus}</span></div>
      <div class="detail-field"><span class="detail-field-label">PEP</span><span class="detail-field-value">${alert.customer.pep ? 'Yes' : 'No'}</span></div>
      <div class="detail-field"><span class="detail-field-label">Risk Score</span><span class="detail-field-value"><span class="score-pill ${alert.riskScore >= 80 ? 'score-high' : alert.riskScore >= 60 ? 'score-medium' : 'score-low'}">${alert.riskScore}/100</span></span></div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Transaction History</div>
      ${txHtml}
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Risk Factors</div>
      ${riskHtml}
    </div>
    ${linkedHtml ? `<div class="detail-section"><div class="detail-section-title">Linked Alerts</div>${linkedHtml}</div>` : ''}

document.getElementById('detail-close').addEventListener('click', () => {

function selectAlert(id) {
  const alert = alerts.find(a => a.id === id);
  if (!alert) return;
  activeAlert = alert;
  renderAlertList();

  // Add AI summary message
  const response = getAlertSummaryResponse(alert);
  addMessage('ai', response.text, response.actions);
  if (response.suggestions) setSuggestions(response.suggestions);
}

// ============================================================
// MINI NETWORK GRAPH (D3.js)
// ============================================================
function renderMiniNetworkGraph(vizHtml) {
  if (!vizHtml || !vizHtml.includes('mini-network-')) return;
  const match = vizHtml.match(/id="network-([^"]+)"/);
  if (!match) return;
  const alertId = match[1];
  const alert = alerts.find(a => a.id === alertId);
  if (!alert) return;

  setTimeout(() => {
    const container = document.getElementById(`network-${alertId}`);
    if (!container) return;
    const width = container.clientWidth;
    const height = container.clientHeight;
    if (width === 0) return;

    const svg = d3.select(container).append('svg').attr('width', width).attr('height', height);
    const g = svg.append('g');

    const nodes = [{ id: alert.customer.name, type: 'center' }];
    const links = [];

    alert.transactions.forEach(tx => {
      if (!nodes.find(n => n.id === tx.counterparty)) {
        nodes.push({ id: tx.counterparty, type: 'counterparty', country: tx.country });
      }
      links.push({ source: alert.customer.name, target: tx.counterparty, value: tx.amount, direction: tx.direction });
    });

    alert.linkedAlerts.forEach(linkedId => {
      const linked = alerts.find(a => a.id === linkedId);
      if (linked && !nodes.find(n => n.id === linked.customer.name)) {
        nodes.push({ id: linked.customer.name, type: 'linked', alertId: linkedId });
      }
    });

    const colorMap = { center: '#3b82f6', counterparty: '#9ca3b8', linked: '#f59e0b' };
    const radiusMap = { center: 20, counterparty: 14, linked: 16 };

    const simulation = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(links).id(d => d.id).distance(80))
      .force('charge', d3.forceManyBody().strength(-200))
      .force('center', d3.forceCenter(width / 2, height / 2))
      .force('collision', d3.forceCollide().radius(30));

    const link = g.selectAll('line').data(links).join('line')
      .attr('stroke', '#4b5563').attr('stroke-width', 1).attr('stroke-opacity', 0.6);

    const node = g.selectAll('g').data(nodes).join('g').attr('cursor', 'pointer');
    node.append('circle').attr('r', d => radiusMap[d.type]).attr('fill', d => colorMap[d.type]);
    node.append('text').attr('text-anchor', 'middle').attr('dy', '0.35em').attr('fill', d => d.type === 'center' ? 'white' : '#0f1117').attr('font-size', 7).attr('font-weight', 600)
      .text(d => d.id.length > 12 ? d.id.substring(0, 10) + '..' : d.id);
    node.append('text').attr('text-anchor', 'middle').attr('dy', d => radiusMap[d.type] + 12).attr('fill', '#9ca3b8').attr('font-size', 8)
      .text(d => d.country || d.alertId || '');

    simulation.on('tick', () => {
      link.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      node.attr('transform', d => `translate(${d.x},${d.y})`);
    });
  }, 100);
}
